<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A responsive image gallery created for the CodeAlpha Frontend Development internship." />
  <title>Wanderlight | Image Gallery</title>
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <p class="eyebrow">CodeAlpha Frontend Task 1</p>
    <h1>Wanderlight Gallery</h1>
    <p class="intro">A collection of places that make you want to stay a little longer.</p>
  </header>

  <main>
    <div class="filters" aria-label="Image categories">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="nature">Nature</button>
      <button class="filter" data-filter="city">City</button>
      <button class="filter" data-filter="travel">Travel</button>
    </div>

    <section class="gallery" aria-label="Photo gallery">
      <button class="card" data-category="nature" data-title="Misty Mountain" data-image="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=85"><img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=900&q=85" alt="Misty mountain range" /><span>Misty Mountain</span></button>
      <button class="card" data-category="city" data-title="City Geometry" data-image="https://images.unsplash.com/photo-1444723121867-7a241cacace9?auto=format&fit=crop&w=1600&q=85"><img src="https://images.unsplash.com/photo-1444723121867-7a241cacace9?auto=format&fit=crop&w=900&q=85" alt="Tall buildings seen from below" /><span>City Geometry</span></button>
      <button class="card" data-category="travel" data-title="Golden Coast" data-image="https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=1600&q=85"><img src="https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=900&q=85" alt="Road through a golden landscape" /><span>Golden Coast</span></button>
      <button class="card" data-category="nature" data-title="Forest Morning" data-image="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1600&q=85"><img src="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=900&q=85" alt="Sunlight in a green forest" /><span>Forest Morning</span></button>
      <button class="card" data-category="city" data-title="Neon Rain" data-image="https://images.unsplash.com/photo-1519608487953-e999c86e7450?auto=format&fit=crop&w=1600&q=85"><img src="https://images.unsplash.com/photo-1519608487953-e999c86e7450?auto=format&fit=crop&w=900&q=85" alt="City lights at night" /><span>Neon Rain</span></button>
      <button class="card" data-category="travel" data-title="Desert Drive" data-image="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=85"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=85" alt="Desert road under a blue sky" /><span>Desert Drive</span></button>
    </section>
  </main>

  <div class="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <button class="close" aria-label="Close image viewer">&times;</button>
    <button class="nav prev" aria-label="Previous image">&#10094;</button>
    <figure><img class="lightbox-image" src="" alt="" /><figcaption></figcaption></figure>
    <button class="nav next" aria-label="Next image">&#10095;</button>
  </div>

  <footer>Made with HTML, CSS & JavaScript</footer>
  <script src="script.js"></script>
</body>
</html>
